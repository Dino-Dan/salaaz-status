<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — Salaaz Status</title>
  <link rel="icon" type="image/png" href="https://salaaz.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #FAF9F5;
      color: #141413;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #FAF9F5;
      border-bottom: 1px solid #DEDCD1;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #141413;
      text-decoration: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      color: #87867F;
      text-decoration: none;
      font-weight: 500;
      margin-left: 1.25rem;
      transition: color 0.15s;
    }

    .nav-links a:hover  { color: #141413; }
    .nav-links a.active { color: #141413; }

    /* ── Layout ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Markdown output ── */
    .md-body h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #141413;
      margin-bottom: 0.25rem;
    }

    .md-body > p:first-of-type {
      font-size: 0.875rem;
      color: #87867F;
      margin-bottom: 2rem;
    }

    .md-body hr {
      border: none;
      border-top: 1px solid #DEDCD1;
      margin: 1.5rem 0;
    }

    .md-body h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #87867F;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #EDECE8;
    }

    .md-body h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #141413;
      margin-bottom: 0.5rem;
    }

    .md-body p {
      font-size: 0.875rem;
      color: #3A3936;
      margin-bottom: 0.6rem;
    }

    .md-body strong {
      font-weight: 600;
      color: #141413;
    }

    .md-body a {
      color: #2C84DB;
      text-decoration: none;
    }

    .md-body a:hover { text-decoration: underline; }

    .md-body ul, .md-body ol {
      padding-left: 1.25rem;
      margin-bottom: 0.6rem;
    }

    .md-body li {
      font-size: 0.875rem;
      color: #3A3936;
      margin-bottom: 0.2rem;
    }

    .md-body code {
      background: #EDECE8;
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-size: 0.82em;
      font-family: 'SFMono-Regular', Consolas, monospace;
    }

    .md-body blockquote {
      border-left: 3px solid #DEDCD1;
      padding-left: 1rem;
      color: #87867F;
      margin: 0.75rem 0;
    }

    /* Entry card wrapping — each section between <hr> tags */
    .md-body h3 + p,
    .md-body h3 + ul {
      margin-top: 0.25rem;
    }

    /* ── Skeleton ── */
    .skeleton-line {
      border-radius: 4px;
      background: linear-gradient(90deg, #EDECE8 25%, #E3E2DE 50%, #EDECE8 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Error ── */
    .load-error {
      background: #FFFFFF;
      border: 1px solid #DEDCD1;
      border-radius: 8px;
      padding: 2rem 1.5rem;
      text-align: center;
      color: #87867F;
      font-size: 0.875rem;
    }

    .load-error a { color: #2C84DB; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #DEDCD1;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #B0ADA4;
      margin-top: 3rem;
    }

    footer a { color: #B0ADA4; text-decoration: none; }
    footer a:hover { color: #141413; }

    @media (max-width: 600px) {
      main { padding: 1.25rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <img src="https://salaaz.com/logo.png" alt="Salaaz" style="height:24px;width:auto;">
    Salaaz Status
  </a>
</nav>

<main>
  <div id="content">
    <div class="skeleton-line" style="height:22px;width:160px"></div>
    <div class="skeleton-line" style="height:14px;width:320px;margin-bottom:2rem"></div>
    <div class="skeleton-line" style="height:12px;width:100px;margin-bottom:1rem"></div>
    <div class="skeleton-line" style="height:16px;width:55%"></div>
    <div class="skeleton-line" style="height:13px;width:80%"></div>
    <div class="skeleton-line" style="height:13px;width:70%"></div>
  </div>
</main>

<footer>
  © 2026 Salaaz
</footer>

<script>
  const CHANGELOG_URL =
    'https://raw.githubusercontent.com/Dino-Dan/salaaz-status/master/CHANGELOG.md';

  async function init() {
    const el = document.getElementById('content');
    try {
      const md = await fetch(CHANGELOG_URL).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.text();
      });

      const html = marked.parse(md);
      el.className = 'md-body';
      el.innerHTML = html;
    } catch (_) {
      el.innerHTML = `
        <div class="load-error">
          Could not load changelog.
          <br><br>
          <a href="https://github.com/Dino-Dan/salaaz-status/blob/master/CHANGELOG.md"
             target="_blank">View CHANGELOG.md on GitHub →</a>
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
