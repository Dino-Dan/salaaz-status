name: ECI Status Check
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check ECI liveness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Ping ECI endpoint
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          if curl -sf --max-time 10 https://salaaz.com/api/status/eci/ > /dev/null 2>&1; then
            STATUS="up"
          else
            STATUS="degraded"
          fi
          echo "{\"status\":\"$STATUS\",\"lastUpdated\":\"$TIMESTAMP\"}" > history/alibaba-ecs-status.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/alibaba-ecs-status.json
          git diff --cached --quiet || git commit -m "ci: update ECI status"
          git push
