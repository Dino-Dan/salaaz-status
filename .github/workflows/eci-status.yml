name: Dependency Status Check
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check service liveness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Ping Django API health
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          HTTP_CODE=$(curl -s --max-time 10 -o /tmp/health-body.txt -w "%{http_code}" \
            -H "Accept: application/json" https://salaaz.com/health/)
          BODY=$(cat /tmp/health-body.txt)
          if [ "$HTTP_CODE" = "200" ] && \
             echo "$BODY" | grep -q '"MongoDBHealthCheck"' && \
             ! echo "$BODY" | grep -q '"unavailable"'; then
            STATUS="up"
          else
            STATUS="degraded"
          fi
          echo "{\"status\":\"$STATUS\",\"lastUpdated\":\"$TIMESTAMP\"}" > history/alibaba-ecs-status.json

      - name: Ping Stallion Express API
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" https://ship.stallionexpress.ca/api/v4)
          case "$HTTP_CODE" in
            2[0-9][0-9]|401|403) STATUS="up" ;;
            *) STATUS="degraded" ;;
          esac
          echo "{\"status\":\"$STATUS\",\"lastUpdated\":\"$TIMESTAMP\"}" > history/stallion-status.json

      - name: Ping Square API
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          if curl -sf --max-time 10 https://www.issquareup.com/api/v2/status.json > /dev/null 2>&1; then
            STATUS="up"
          else
            STATUS="degraded"
          fi
          echo "{\"status\":\"$STATUS\",\"lastUpdated\":\"$TIMESTAMP\"}" > history/square-status.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add history/alibaba-ecs-status.json history/stallion-status.json history/square-status.json
          git diff --cached --quiet || git commit -m "ci: update dependency status"
          git push
