name: Graphs CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:
concurrency:
  group: upptime-master
  cancel-in-progress: false

jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Install git push wrapper
        run: |
          mkdir -p "$HOME/bin"
          cat > "$HOME/bin/git" << 'WRAPPER'
          #!/bin/bash
          if [ "$1" = "push" ]; then
            for i in 1 2 3; do
              /usr/bin/git "$@" && exit 0
              echo "[git-wrapper] push attempt $i failed, rebasing..."
              /usr/bin/git pull --rebase -X ours origin master || \
                /usr/bin/git rebase --abort 2>/dev/null || true
              sleep $((i * 5))
            done
            /usr/bin/git "$@"
            exit $?
          fi
          exec /usr/bin/git "$@"
          WRAPPER
          chmod +x "$HOME/bin/git"
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
