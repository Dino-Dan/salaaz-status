name: Guard Custom Pages

on:
  push:
    branches: [gh-pages]

jobs:
  overlay:
    name: Re-overlay custom pages
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: master
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Overlay custom pages if changed
        run: |
          cp master/status-page/index.html gh-pages/index.html
          cp master/status-page/incidents.html gh-pages/incidents.html

      - name: Commit and push if different
        working-directory: gh-pages
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add index.html incidents.html
          if ! git diff --staged --quiet; then
            git commit -m "Restore custom pages [skip ci]"
            git push origin gh-pages
          fi
