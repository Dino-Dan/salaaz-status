name: Static Site CI
on:
  push:
    branches: [master]
    paths: [status-page/**]
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy custom status page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: status-page/
          cname: status.salaaz.com
          force_orphan: false
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
          commit_message: "Deploy custom status page [skip ci]"
