name: Summary CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [summary]
  workflow_dispatch:
concurrency:
  group: upptime-master
  cancel-in-progress: false

jobs:
  release:
    name: Generate README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update summary in README
        id: uptime_action
        uses: upptime/uptime-monitor@v1.41.3
        continue-on-error: true
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Retry push if needed
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
        run: |
          git fetch origin master
          AHEAD=$(git rev-list --count origin/master..HEAD)
          if [ "$AHEAD" -gt 0 ]; then
            for i in 1 2 3; do
              git pull --rebase origin master && git push origin master && exit 0
              echo "Push retry $i failed, waiting..."
              sleep $((i * 15))
            done
            exit 1
          fi
          [ "${{ steps.uptime_action.outcome }}" != "failure" ]
