name: Custom Status Page

on:
  push:
    branches: [master]
    paths: [status-page/**]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy custom index to gh-pages
    runs-on: ubuntu-latest
    if: true
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: master
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Copy custom pages
        run: cp -r master/status-page/. gh-pages/

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add index.html changelog.html incidents.html
          git diff --staged --quiet || git commit -m "Update custom status page [skip ci]"
          git pull --rebase origin gh-pages
          git push origin gh-pages
