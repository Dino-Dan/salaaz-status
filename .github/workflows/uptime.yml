name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
concurrency:
  group: upptime-master
  cancel-in-progress: false

jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check endpoint status
        id: uptime_action
        uses: upptime/uptime-monitor@v1.41.3
        continue-on-error: true
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Retry push if needed
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
        run: |
          git fetch origin master
          AHEAD=$(git rev-list --count origin/master..HEAD)
          DIRTY=$(git status --porcelain | wc -l | tr -d ' ')
          echo "Commits ahead of origin: $AHEAD  |  Dirty files: $DIRTY  |  Action: ${{ steps.uptime_action.outcome }}"
          if [ "$AHEAD" -gt 0 ]; then
            for i in 1 2 3; do
              git pull --rebase origin master && git push origin HEAD:master && exit 0
              echo "Push retry $i failed, waiting..."
              sleep $((i * 15))
            done
            exit 1
          fi
          if [ "$DIRTY" -gt 0 ] && [ "${{ steps.uptime_action.outcome }}" = "failure" ]; then
            exit 1
          fi
          exit 0
